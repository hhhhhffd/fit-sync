<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Fitness App</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="loading" style="text-align: center; padding: 50px;">
        <h2 id="loading-title">Загрузка...</h2>
        <p id="loading-hint">Инициализация Telegram Web App...</p>
    </div>

    <div id="app" class="hidden">
        <header style="background: var(--tg-theme-bg-color, #2c3e50); color: var(--tg-theme-text-color, white);">
            <div class="container">
                <h1>🏋️ Fitness App</h1>
                <nav>
                    <a href="#" onclick="showDashboard()" id="nav-dashboard">Главная</a>
                    <a href="#" onclick="showProfile()" id="nav-profile">Профиль</a>
                    <a href="#" onclick="showChallenges()" id="nav-challenges">Челленджи</a>
                    <a href="#" onclick="showLeaderboard()" id="nav-leaderboard">Лидерборд</a>
                </nav>
            </div>
        </header>

        <div class="container">
            <div id="content"></div>
        </div>
    </div>

    <script src="js/messages.js"></script>
    <script src="js/app.js"></script>
    <script src="js/webapp.js"></script>
</body>
</html>
